---
layout: default
---
<!-- Page band -->
<div style="background: var(--brand-green); color: white; padding-block: var(--sp-8); text-align: center;">
  <div class="container">
    <h1 style="color:white; margin:0 0 var(--sp-3) 0;">Portfolio</h1>
    <p style="color:rgba(255,255,255,0.85); max-width:55ch; margin-inline:auto; margin-bottom:0;">
      Professional contracts and long-term engagements — enterprise systems, telecom platforms, and email infrastructure.
    </p>
  </div>
</div>

<div class="container section">
  {{ content }}
  <div class="card-grid">
    {% for item in site.data.portfolio %}
    {% include portfolio-card.html item=item %}
    {% endfor %}
  </div>
</div>
