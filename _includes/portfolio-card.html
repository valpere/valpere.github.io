{% assign i = include.item %}
<article class="card">
  {% if i.hero_image and i.hero_image != "" %}
  <img src="{{ i.hero_image | relative_url }}" alt="{{ i.client }}" class="card__image" loading="lazy" width="384" height="216">
  {% endif %}
  <div class="card__body">
    <h3 class="card__title" style="font-size:var(--text-lg);">
      <a href="{{ i.permalink | relative_url }}">{{ i.client }}</a>
    </h3>
    <p class="card__summary">{{ i.role }} · {{ i.period }}</p>
    <p class="card__summary">{{ i.summary_en }}</p>
    {% if i.stack %}
    <div class="tag-list">
      {% for t in i.stack limit: 5 %}<span class="tag">{{ t }}</span>{% endfor %}
    </div>
    {% endif %}
  </div>
  <div class="card__footer">
    <a href="{{ i.permalink | relative_url }}" class="btn btn--outline btn--sm">View Details</a>
  </div>
</article>
