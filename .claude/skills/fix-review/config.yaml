# fix-review multi-model configuration — valpere.github.io (Jekyll blog)
#
# Provider: Ollama via local daemon (http://localhost:11434).
# The local Ollama daemon is authenticated via device key and proxies
# :cloud model requests — no OLLAMA_API_KEY env var needed.
# See: https://docs.ollama.com/api/authentication

provider: ollama

reviewers:
  ollama_cloud:
    round_1:
      model: deepseek-v4-flash:cloud
      think: true
    round_2:
      model: qwen3-coder-next:cloud
      think: false
    round_3:
      model: gemma4:31b-cloud
      think: false

  ollama_local:
    round_1:
      model: granite3.3:8b
    round_2:
      model: qwen2.5-coder:7b
    round_3:
      model: granite3.3:8b

  cli:
    - { name: opencode,     cmd: "sh -c 'opencode run -m opencode/nemotron-3-super-free --format json \"$(cat)\"'" }
    - { name: gemini,       cmd: "gemini --model gemini-2.5-flash-lite" }
    - { name: codex,        cmd: "codex --dangerously-bypass-approvals-and-sandbox review -" }
    - { name: cursor-agent, cmd: "cursor-agent --model auto" }
    - { name: kilo,         cmd: "sh -c 'kilo run \"$(cat)\"'" }
    - { name: agy,          cmd: "agy --print --model 'GPT-OSS 120B (Medium)' --dangerously-skip-permissions" }

reviewer_set: cloud

# Both point to localhost — the daemon authenticates via device key.
ollama_api_url: http://localhost:11434/api/chat
ollama_api_url_local: http://localhost:11434/api/chat

arbiter: claude

diff_scope: delta
post_summary_to_pr: true

telemetry_enabled: true
telemetry_file: .claude/skills/fix-review/telemetry.jsonl
