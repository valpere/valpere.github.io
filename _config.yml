title: Valentyn S
description: "Extracts Everything"
url: "https://valpere.github.io"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima # or your chosen theme from https://pages.github.com/themes/

# Minima skin configuration
minima:
  skin: solarized-light

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-polyglot

# Polyglot i18n
languages: ["en", "uk"]
default_lang: "en"
url_langs: ["uk"]
parallel_localization: false
exclude_from_localization:
  - assets
  - robots.txt

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false

# Social links
github_username: valpere

# Exclude files from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - CLAUDE.md
  - ".claude/"
  - "freelancehunt-*.txt"
  - "assets/images/brand/README.md"
  - "docs/"
